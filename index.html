<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Les Pointures des fléchettes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e94560">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg: #0f0c29; --c-surface: #1b1644; --c-primary: #e94560; --c-accent: #f9d342; --c-text: #ffffff;
            --c-variant: #4834d4;
        }
        .p-color-0 { --p-col: #ff4757; } .p-color-1 { --p-col: #2ed573; }
        .p-color-2 { --p-col: #1e90ff; } .p-color-3 { --p-col: #ffa502; }
        .p-color-4 { --p-col: #e056fd; } .p-color-5 { --p-col: #7bed9f; }
        .p-color-6 { --p-col: #70a1ff; } .p-color-7 { --p-col: #535c68; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: var(--c-text); min-height: 100vh; overflow-x: hidden; position: relative; }
        .container { max-width: 950px; margin: 0 auto; padding: 8px; }
        
        .header { text-align: center; padding: 8px; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--c-primary); border-radius: 20px; margin-bottom: 15px; position: relative; }
        .header h1 { font-family: 'Luckiest Guy', cursive; font-size: 1.8rem; color: var(--c-accent); text-shadow: 2px 2px 0 var(--c-primary); padding-right: 90px; text-align: left; padding-left: 10px; }

        .card { background: var(--c-surface); padding: 10px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        .manche-info { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; margin-bottom: 10px; border: 1px solid var(--c-primary); display: inline-block; }

        /* Game Selector Grid */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .game-item { position: relative; display: flex; align-items: stretch; }
        .game-btn { flex: 1; padding: 12px 5px; border-radius: 10px 0 0 10px; border: 2px solid var(--c-primary); background: transparent; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .game-btn.active { background: var(--c-primary); box-shadow: 0 0 10px var(--c-primary); }
        .info-btn { width: 40px; border: 2px solid var(--c-primary); border-left: none; border-radius: 0 10px 10px 0; background: rgba(255,255,255,0.1); color: var(--c-accent); font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--c-primary); color: white; width: 100%; box-shadow: 0 4px 0 #a31d34; font-size: 1.1rem; }
        .btn-add { background: var(--c-accent); color: #000; width: 100%; margin-top: 5px; }

        .selector { background: #241f4a; color: white; border: 1px solid var(--c-accent); padding: 10px; border-radius: 10px; width: 100%; margin: 5px 0; font-size: 1rem; }

        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 6px; }
        .num-btn { background: #3a3471; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 2px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; box-shadow: 0 2px 0 #241f4a; }
        .num-btn:active { background: var(--c-accent); color: #000; transform: translateY(2px); box-shadow: none; }
        
        /* Coloration numpad selon multiplicateur */
        .numpad.mult-2 .num-btn:not(.special-btn) { background:#f9d342 !important; color:#000 !important; border:2px solid #39ff14 !important; box-shadow:0 0 12px #39ff14 !important; }
        .numpad.mult-3 .num-btn:not(.special-btn) { background:#f9d342 !important; color:#000 !important; border:2px solid #ff3131 !important; box-shadow:0 0 12px #ff3131 !important; }

        /* Modale */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--c-surface); margin: 5% auto; padding: 25px; border: 2px solid var(--c-accent); width: 90%; max-width: 600px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; color: var(--c-primary); cursor: pointer; }
        .modal-content h2 { color: var(--c-accent); margin-bottom: 15px; border-bottom: 1px solid var(--c-primary); padding-bottom: 5px; }
        .modal-content p { font-size: 0.9rem; line-height: 1.6; margin-bottom: 12px; text-align: justify; }
        .modal-content b { color: var(--c-primary); }

        /* Rest of the styles */
        .player-tag { background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border-left: 5px solid var(--p-col); margin-bottom: 8px; }
        .player-name { flex: 1; font-weight: 600; color: var(--p-col); }
        .reorder-btns { display: flex; flex-direction: column; gap: 2px; }
        .reorder-btn { background: none; border: none; color: var(--c-accent); cursor: pointer; padding: 2px 5px; font-size: 1.2rem; }
        .current-p-box { text-align: center; background: rgba(255,255,255,0.07); padding: 8px; border-radius: 16px; border: 3px solid var(--p-col); margin-bottom: 10px; box-shadow: 0 0 24px var(--p-col), inset 0 0 18px rgba(255,255,255,0.04); animation: pulseBox 2s ease-in-out infinite; }
        @keyframes pulseBox { 0%,100%{ box-shadow: 0 0 18px var(--p-col), inset 0 0 12px rgba(255,255,255,0.03); } 50%{ box-shadow: 0 0 38px var(--p-col), inset 0 0 22px rgba(255,255,255,0.07); } }
        .turn-badge { display: inline-block; background: var(--p-col); color: #000; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding: 3px 12px; border-radius: 20px; margin-bottom: 6px; }
        .dart-throw { display: inline-flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4px; }
        .active-player-card { box-shadow: 0 0 16px var(--p-col) !important; transform: scale(1.04); transition: transform 0.2s; }
        .mult-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .m-btn { flex: 1; min-width: 80px; padding: 8px; border-radius: 10px; border: 2px solid var(--c-primary); background: transparent; color: white; font-weight: bold; font-size: 0.85rem; }
        .m-btn.active { background: var(--c-primary); box-shadow: 0 0 10px var(--c-primary); }
        .v-btn { flex: 1; min-width: 100px; padding: 10px; border-radius: 10px; border: 2px solid var(--c-variant); background: transparent; color: white; font-weight: bold; font-size: 0.85rem; }
        .v-btn.active { background: var(--c-variant); box-shadow: 0 0 10px var(--c-variant); }
        .pyramid { display: flex; flex-direction: column-reverse; align-items: center; gap: var(--brick-gap, 4px); margin: 10px auto; }
        .pyramid-row { display: flex; gap: var(--brick-gap, 4px); justify-content: center; }
        .brick { width: var(--brick-w, 28px); height: var(--brick-h, 18px); border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; background: rgba(255,255,255,0.03); }
        .brick.filled { background: var(--p-brick-col); box-shadow: 0 0 6px var(--p-brick-col); border-color: white; }
        .cricket-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .cricket-table th, .cricket-table td { padding: 8px 2px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .active-row { background: rgba(255,255,255,0.1); font-weight: bold; }
        .mark { font-size: 1.4rem; font-weight: bold; }
        .mark-2 { color: var(--c-accent); } .mark-3 { color: #00ff00; }
        .target-badge { position: absolute; top: 10px; right: 10px; background: var(--c-accent); color: #000; padding: 5px 15px; border-radius: 12px; text-align: center; border: 2px solid #fff; z-index: 10; transform: scale(1.3); right: 20px!important; top: 20px!important; }
        .target-val { font-size: 1.8rem; font-weight: 900; line-height: 1; display: block; }

        /* BUST overlay */
        .bust-overlay { position: fixed; z-index: 200; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); animation: bustFadeIn 0.15s ease; pointer-events: none; }
        .bust-text { font-family: 'Luckiest Guy', cursive; font-size: clamp(5rem, 20vw, 10rem); color: #e94560; text-shadow: 0 0 40px #e94560, 4px 4px 0 #7a0f20; animation: bustShake 0.5s ease; letter-spacing: 4px; }
        @keyframes bustFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bustShake { 0%,100%{transform:rotate(-3deg) scale(1.1)} 20%{transform:rotate(4deg) scale(1.15)} 40%{transform:rotate(-4deg) scale(1.2)} 60%{transform:rotate(3deg) scale(1.15)} 80%{transform:rotate(-2deg) scale(1.1)} }

        /* Checkout panel */
        .checkout-box { background: rgba(249,211,66,0.15); border: 2px solid var(--c-accent); border-radius: 16px; padding: 12px 16px; margin-top: 8px; box-shadow: 0 0 18px rgba(249,211,66,0.25); text-align: center; }
        .checkout-title { font-size: 0.85rem; color: var(--c-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .checkout-combo { font-size: 1.05rem; color: #fff; margin: 5px 0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; }
        .dart-chip { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 5px 12px; font-weight: 700; font-size: 1.05rem; }
        .dart-chip.dbl { background: rgba(233,69,96,0.45); color: #ff8fa3; border: 1px solid #ff8fa3; }
        .dart-chip.tpl { background: rgba(72,52,212,0.55); color: #c4b9ff; border: 1px solid #a89dff; }
        .dart-chip.bull { background: rgba(249,211,66,0.35); color: var(--c-accent); border: 1px solid var(--c-accent); }
    
        .winner-overlay{ position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999; display:flex;align-items:center;justify-content:center;flex-direction:column; animation:fadeIn .4s ease; }
        .winner-box{ background:#1b1644;border:4px solid gold;border-radius:30px; padding:40px;text-align:center;box-shadow:0 0 40px gold; }
        .winner-box h1{font-size:4rem;color:gold}
        .confetti{ position:absolute;font-size:2rem;animation:fall 4s linear infinite; }
        @keyframes fall{ 0%{transform:translateY(-100vh) rotate(0deg);} 100%{transform:translateY(100vh) rotate(360deg);} }
        .m-btn.active-double{ background:#39ff14 !important; border-color:#39ff14 !important; color:#000 !important; box-shadow:0 0 20px #39ff14 !important; }
        .m-btn.active-triple{ background:#ff3131 !important; border-color:#ff3131 !important; color:#fff !important; box-shadow:0 0 20px #ff3131 !important; }
        .target-inline{ display:inline-block; background:#f9d342; color:#000; padding:10px 20px; border-radius:15px; margin-left:15px; font-size:1.5rem; font-weight:900; border:3px solid #fff; }

        /* Conteneur discret du selecteur de langue haut droite */
        .lang-container { position: absolute; top: 12px; right: 12px; z-index: 101; }
        .lang-select { background: rgba(27, 22, 68, 0.95); color: var(--c-accent); border: 2px solid var(--c-primary); padding: 5px 8px; border-radius: 10px; font-size: 0.85rem; font-weight: bold; cursor: pointer; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .lang-select:hover { border-color: var(--c-accent); }
    </style>
</head>

    // ── Synthèse Vocale Web Audio ─────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function speak(text, pitch=1.0, rate=1.0) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = S.lang === 'ga' ? 'en-IE' : (S.lang === 'nl' ? 'nl-NL' : (S.lang === 'de' ? 'de-DE' : (S.lang === 'es' ? 'es-ES' : 'fr-FR')));
        u.pitch = pitch; u.rate = rate;
        window.speechSynthesis.speak(u);
    }
    function playTone(freq, type, duration, vol=0.1) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function soundDart() { playTone(550, 'triangle', 0.08, 0.15); }
    function soundHit() { playTone(880, 'sine', 0.12, 0.2); }
    function soundBust() { playTone(180, 'sawtooth', 0.4, 0.25); }
    function soundUndo() { playTone(400, 'sine', 0.06, 0.1); }
    function soundMancheWin() { playTone(587.33, 'square', 0.15, 0.15); setTimeout(()=>playTone(880, 'square', 0.4, 0.15), 150); }
    function soundKillerOut() { playTone(220, 'sawtooth', 0.5, 0.3); }

    // Visual effect overlays
    function animHit(pts) {
        const d = document.createElement('div'); d.style = "position:fixed; z-index:999; color:#f9d342; font-size:4.5rem; font-family:'Luckiest Guy',cursive; font-weight:bold; pointer-events:none; text-shadow:0 0 20px #f9d342; transform:translate(-50%,-50%); left:50%; top:45%; animation:hitScale 0.6s ease forward"; d.innerText = `+${pts}`; document.body.appendChild(d); setTimeout(()=>d.remove(), 600);
    }
    function animKillerOut(name) {
        const d = document.createElement('div'); d.style = "position:fixed; z-index:999; color:#ff4757; font-size:3rem; font-weight:800; text-align:center; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); animation:bustFadeIn 0.5s"; d.innerHTML = `<div>💀 ${name}<br>ELIMINATED !</div>`; document.body.appendChild(d); setTimeout(()=>d.remove(), 1500);
    }
    const styleAnim = document.createElement('style'); styleAnim.innerHTML = `@keyframes hitScale { 0%{transform:translate(-50%,-50%) scale(0.3); opacity:0} 30%{transform:translate(-50%,-50%) scale(1.2); opacity:1} 100%{transform:translate(-50%,-65%) scale(1); opacity:0} }`; document.head.appendChild(styleAnim);

    function initScores() {
        S.scores = {}; S.round = 1; S.throws = []; S.multiplier = 1; S.bust = false; S.setupPhase = false; S.winner = null;
        if(S.game === 'follow') { S.followTarget = Array.from({length:3}, () => Math.floor(Math.random()*20)+1); S.followSetter = -1; S.followPhase = 'set'; }
        S.players.forEach(p => {
            S.wins[p.name] = S.wins[p.name] || 0;
            if (S.game === 'x01') S.scores[p.name] = { score: parseInt(S.variant), out: false, stats: { totalDarts: 0, 60:0, 100:0, 140:0, 180:0 } };
            else if (S.game === 'cricket') {
                let items = { 15:0, 16:0, 17:0, 18:0, 19:0, 20:0, 25:0 };
                S.scores[p.name] = { score: 0, marks: items, out: false };
            }
            else if (S.game === 'capital') S.scores[p.name] = { score: S.variant === 'Départ 40' ? 40 : 0, history: [], out: false };
            else if (S.game === 'chateau') S.scores[p.name] = { bricks: 0, target: 0, out: false };
            else if (S.game === 'killer') S.scores[p.name] = { lives: 0, target: 0, out: false };
            else if (S.game === 'follow') S.scores[p.name] = { points: 0, out: false };
            else if (S.game === 'batard') S.scores[p.name] = { points: 0, out: false, ref: null };
            else if (S.game === 'shanghai') S.scores[p.name] = { points: 0, out: false };
        });
        if(['chateau', 'killer'].includes(S.game)) { S.setupPhase = true; S.setupIndex = 0; }
        else updateTargetValue();
    }

    function updateTargetValue() {
        if(S.game === 'capital') { const targets = [15,16,99,17,18,98,19,20,25]; S.targetValue = targets[(S.round-1) % targets.length]; }
        else if(S.game === 'shanghai') S.targetValue = ((S.round - 1) % S.shanghaiMaxTours) + 1;
    }

    // ── Moteur Graphique Global RENDER ─────────────────────────────────────
    function render() {
        const root = document.getElementById('app');
        if (S.screen === 'setup') { root.innerHTML = renderSetup(); return; }
        
        let html = `
            <div class="header" style="margin-bottom:8px; padding:6px">
                <h1>${_t('title')}</h1>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
                <div class="manche-info" style="margin-bottom:0">${_t('manche')} ${S.currentManche} | ${_t('tour')} ${S.round}</div>
                <div style="display:flex; gap:6px">
                    <button class="btn" style="padding:4px 10px; background:#444; font-size:0.75rem; border-radius:8px" onclick="undo()">⬅️ ${_t('undo')}</button>
                    <button class="btn" style="padding:4px 10px; background:var(--c-primary); font-size:0.75rem; border-radius:8px" onclick="endGame()">❌ ${_t('quit')}</button>
                </div>
            </div>
        `;
        
        if (S.winner) { html += renderWinnerBox(); root.innerHTML = html; return; }
        if (S.setupPhase) { html += renderSetupPhase(); root.innerHTML = html; return; }
        
        html += renderCurrentPlayerGrid();
        html += renderLeaderboardGrid();
        html += renderNumpadSection();
        
        if (S.bust) {
            html += `<div class="bust-overlay"><div class="bust-text">${_t('bust')}</div></div>`;
            setTimeout(() => { S.bust = false; render(); }, 1000);
        }
        root.innerHTML = html;
    }

        const val = parseInt(v);

    }
    function selectGame(g) { S.game = g; S.variant = GAMES[g].variants[0]; render(); }
    function selectVariant(v) { S.variant = v; render(); }
    function addPlayer() {
        const input = document.getElementById('newPlayerName'); if(!input) return;
        const name = input.value.trim(); if(!name) return;
        if(S.players.some(p => p.name.toLowerCase() === name.toLowerCase())) { alert("Nom déjà pris !"); return; }
        S.players.push({ name }); input.value = ''; localStorage.setItem('darts_current', JSON.stringify(S.players)); render();
    }
    function removePlayer(i) { S.players.splice(i, 1); localStorage.setItem('darts_current', JSON.stringify(S.players)); render(); }
    function movePlayer(i, dir) {
        if(i+dir < 0 || i+dir >= S.players.length) return;
        const tmp = S.players[i]; S.players[i] = S.players[i+dir]; S.players[i+dir] = tmp;
        localStorage.setItem('darts_current', JSON.stringify(S.players)); render();
    }
    function startMatch() {
        if(S.players.length === 0) { alert("Ajoutez au moins un joueur !"); return; }
        S.wins = {}; S.winnersHistory = []; S.currentManche = 1; S.screen = 'game'; initScores(); render();
        if(S.players.length > 0) speak(_t('yourTurn') + " " + S.players[0].name, 1.1, 0.95);
    }

    function submitSetupNumber(num) {
        pushHistory();
        const currentP = S.players[S.setupIndex].name;
        // Vérification unicité du numéro choisi
        let conflict = false;
        for(let i=0; i<S.setupIndex; i++) {
            const op = S.players[i].name;
            if((S.game==='chateau' && S.scores[op].target === num) || (S.game==='killer' && S.scores[op].target === num)) { conflict = true; break; }
        }
        if(conflict) { alert("Ce numéro est déjà attribué à un autre joueur !"); return; }
        
        if(S.game === 'chateau') S.scores[currentP].target = num;
        else S.scores[currentP].target = num;

        S.setupIndex++;
        if(S.setupIndex >= S.players.length) { S.setupPhase = false; S.cp = 0; updateTargetValue(); }
        render();
        if(!S.setupPhase) speak(_t('yourTurn') + " " + S.players[S.cp].name, 1.1, 0.95);

    function setMultiplier(m) { soundUndo(); S.multiplier = m; render(); }

    // ── Logique de Traitement Mathématique des Lancers ─────────────────────
    function hitNumber(val) {
        if(S.throws.length >= 3) return;
        if(val === 25 && S.multiplier === 3) { alert("Le triple bulle n'existe pas !"); return; }
        pushHistory();
        
        S.throws.push({ val: val, mult: S.multiplier, miss: false });
        S.multiplier = 1; // reset automatique à simple après un tir
        
        // Exécuter l'action en temps réel pour certains jeux, ou calculer à la volée
        applyLiveThrowLogic();
        render();
    }

    function hitMiss() {
        if(S.throws.length >= 3) return;
        pushHistory();
        S.throws.push({ val: 0, mult: 1, miss: true });
        S.multiplier = 1;
        applyLiveThrowLogic();
        render();
    }

    function clearLastThrow() {
        if(S.throws.length === 0) return;
        soundUndo();
        // Remonter simplement d'un cran dans l'historique
        S = JSON.parse(HISTORY.pop());
        render();
    }

    function applyLiveThrowLogic() {
        const p = S.players[S.cp].name; const sco = S.scores[p];
        const last = S.throws[S.throws.length - 1];
        
        if (S.game === 'x01') {
            const points = last.miss ? 0 : last.val * last.mult;
            if(sco.score - points < 0) {
                soundBust(); S.bust = true; last.isBust = true;
                // Forcer la fin immédiate de la volée (Bust)
                while(S.throws.length < 3) S.throws.push({ val: 0, mult: 1, miss: true, isBust: true });
            } else if (sco.score - points === 1) {
                // Règle Double Out : On ne peut pas finir ou rester sur un reliquat de 1
                soundBust(); S.bust = true; last.isBust = true;
                while(S.throws.length < 3) S.throws.push({ val: 0, mult: 1, miss: true, isBust: true });
            } else if (sco.score - points === 0) {
                if(last.mult !== 2 && last.val !== 25) { // Doit être double ou centre (Bulle compte double out si double centre)
                    soundBust(); S.bust = true; last.isBust = true;
                    while(S.throws.length < 3) S.throws.push({ val: 0, mult: 1, miss: true, isBust: true });
                } else {
                    sco.score = 0; soundHit(); animHit(points);
                    while(S.throws.length < 3) S.throws.push({ val: 0, mult: 1, miss: false });
                }
            } else {
                sco.score -= points; if(points > 0) { soundHit(); animHit(points); } else soundDart();
            }
        }
        else if (S.game === 'cricket') {
            if(last.miss || ![15,16,17,18,19,20,25].includes(last.val)) { soundDart(); return; }
            const sec = last.val; const m = last.mult;
            let addedMarks = 0;
            
            for(let i=0; i<m; i++) {
                if(sco.marks[sec] < 3) {
                    sco.marks[sec]++; addedMarks++;
                } else {
                    // Est-ce ouvert pour d'autres joueurs ?
                    let closedByAll = S.players.every(pl => S.scores[pl.name].marks[sec] >= 3);
                    if(!closedByAll) {
                        if(S.variant === 'Standard') {
                            sco.score += sec; sco.scoreGained = true;
                        } else {
                            // Cut-Throat (Inversé) : On ajoute aux adversaires qui ne l'ont pas fermé
                            S.players.forEach(pl => {
                                if(pl.name !== p && S.scores[pl.name].marks[sec] < 3) { S.scores[pl.name].score += sec; }
                            });
                        }
                    }
                }
            }
            if(addedMarks > 0 || sco.scoreGained) { soundHit(); animHit(last.val * last.mult); sco.scoreGained = false; } else soundDart();
        }
        else if (S.game === 'capital') {
            const isTarget = (S.targetValue === 99 && last.mult === 2 && !last.miss) || 
                             (S.targetValue === 98 && last.mult === 3 && !last.miss) || 
                             (S.targetValue === last.val && !last.miss);
            if(isTarget) {
                let pts = last.val === 25 ? (last.mult === 2 ? 50 : 25) : last.val * last.mult;
                if(S.targetValue === 99 || S.targetValue === 98) pts = last.val * last.mult;
                sco.score += pts; soundHit(); animHit(pts);
            } else soundDart();
        }
        else if (S.game === 'chateau') {
            if(!last.miss) {
                // Si touche son propre chateau -> Construit
                if(last.val === sco.target) {
                    sco.bricks = Math.min(15, sco.bricks + last.mult); soundHit(); animHit(last.mult);
                } else {
                    // Est-ce le chateau d'un rival ?
                    let hitRival = false;
                    S.players.forEach(pl => {
                        if(pl.name !== p && S.scores[pl.name].target === last.val) {
                            S.scores[pl.name].bricks = Math.max(0, S.scores[pl.name].bricks - last.mult);
                            hitRival = true;
                        }
                    });
                    if(hitRival) { soundKillerOut(); animHit(last.mult); } else soundDart();
                }
            } else soundDart();
        }
        else if (S.game === 'killer') {
            if(!last.miss) {
                const maxLives = S.variant === '5 Vies' ? 5 : 3;
                if(last.val === sco.target) {
                    if(sco.lives < maxLives) { sco.lives = Math.min(maxLives, sco.lives + last.mult); soundHit(); }
                    else soundDart();
                } else {
                    // Attaque un adversaire si on est Killer
                    if(sco.lives >= maxLives) {
                        let hitRival = false;
                        S.players.forEach(pl => {
                            if(pl.name !== p && S.scores[pl.name].target === last.val) {
                                S.scores[pl.name].lives = Math.max(0, S.scores[pl.name].lives - last.mult);
                                if(S.scores[pl.name].lives === 0) S.scores[pl.name].out = true;
                                hitRival = true;
                            }
                        });
                        if(hitRival) { soundKillerOut(); } else soundDart();
                    } else soundDart();
                }
            } else soundDart();
        }
        else if (S.game === 'follow') {
            if(!last.miss && S.followTarget.includes(last.val)) {
                let pts = last.val * last.mult; sco.points += pts; soundHit(); animHit(pts);
            } else soundDart();
        }
        else if (S.game === 'batard') {
            if(sco.ref === null) {
                sco.ref = last.miss ? 0 : last.val * last.mult;
                sco.points += sco.ref; if(sco.ref > 0) { soundHit(); animHit(sco.ref); } else soundDart();
            } else {
                if(last.miss) { sco.points -= 10; soundBust(); }
                else {
                    let pts = last.val * last.mult;
                    if(pts >= sco.ref) { sco.points += pts; soundHit(); animHit(pts); }
                    else { sco.points -= pts; soundBust(); }
                }
            }
        }
        else if (S.game === 'shanghai') {
            if(!last.miss && last.val === S.targetValue) {
                let pts = last.val * last.mult; sco.points += pts; soundHit(); animHit(pts);
            } else soundDart();
        }
    }

    function validateTurn() {
        pushHistory();
        const p = S.players[S.cp].name; const sco = S.scores[p];
        
        // Traitement de fin de tour pour certains modes spécifiques
        if (S.game === 'capital') {
            const hasHit = S.throws.some(t => !t.miss && ((S.targetValue===99 && t.mult===2)||(S.targetValue===98 && t.mult===3)||(t.val===S.targetValue)));
            if(!hasHit) { sco.score = Math.round(sco.score / 2); soundBust(); S.bust = true; }
        }
        else if (S.game === 'follow') {
            // Les nouvelles cibles deviennent ce que le joueur a touché
            let hits = S.throws.filter(t => !t.miss).map(t => t.val);
            // complété par du hasard pour en avoir 3
            while(hits.length < 3) hits.push(Math.floor(Math.random()*20)+1);
            S.followTarget = hits;
        }
        else if (S.game === 'shanghai') {
            // Vérification du coup automatique d'éclat Shanghai (Un simple, un double, un triple du chiffre dans la même volée)
            let match = S.throws.filter(t => !t.miss && t.val === S.targetValue);
            let mults = match.map(t => t.mult);
            if(mults.includes(1) && mults.includes(2) && mults.includes(3)) {
                finalizeManche(p); return;
            }
        }

        // Réinitialisation variables de volée
        S.throws = []; S.multiplier = 1; if(S.game==='batard') sco.ref = null;

        // Passer au joueur suivant encore en lice
        let nextCp = S.cp;
        let loops = 0;
        do {
            nextCp = (nextCp + 1) % S.players.length;
            loops++;
            if(nextCp === 0 && loops <= S.players.length) {
                S.round++; updateTargetValue();
            }
        } while(S.scores[S.players[nextCp].name].out && loops <= S.players.length);

        S.cp = nextCp;
        checkMancheWinner();
    }

    // ── Vérification des Règles Spécifiques d'Arbitrage Automatique ───────
    function checkMancheWinner() {
        // Mode X01
        S.players.forEach(p => { if(S.scores[p.name].score === 0) { finalizeManche(p.name); } });
        if(S.winner) return;

        // Mode Cricket
        if(S.game === 'cricket') {
            S.players.forEach(p => {
                let allClosed = [15,16,17,18,19,20,25].every(sec => S.scores[p.name].marks[sec] >= 3);
                if(allClosed) {
                    if(S.variant === 'Standard') {
                        let maxScore = Math.max(...S.players.map(pl => S.scores[pl.name].score));
                        if(S.scores[p.name].score >= maxScore) finalizeManche(p.name);
                    } else {
                        // Cut-Throat : Doit posséder le score le plus bas
                        let minScore = Math.min(...S.players.map(pl => S.scores[pl.name].score));
                        if(S.scores[p.name].score <= minScore) finalizeManche(p.name);
                    }
                }
            });
        }
        if(S.winner) return;

        // Mode Capital
        if(S.game === 'capital' && S.round > 9) {
            let maxP = S.players.reduce((a,b) => S.scores[a.name].score >= S.scores[b.name].score ? a : b);
            finalizeManche(maxP.name); return;
        }

        // Mode Château
        if(S.game === 'chateau') {
            const at15 = S.players.find(p => S.scores[p.name].bricks >= 15);
            if(at15) { finalizeManche(at15.name); return; }
            if (S.round > S.chateauMaxTours) {
                const chWinner = S.players.reduce((a,b) => S.scores[a.name].bricks >= S.scores[b.name].bricks ? a : b);
                finalizeManche(chWinner.name); return;
            }
        }

        // Mode Killer
        let active = S.players.filter(p => !S.scores[p.name].out);
        if(S.game === 'killer' && active.length === 1) { finalizeManche(active[0].name); return; }

        // Mode Follow Me
        if(S.game === 'follow' && S.round > 10) {
            finalizeManche(S.players.reduce((a,b) => S.scores[a.name].points > S.scores[b.name].points ? a : b).name); return;
        }

        // Mode Bâtard
        if(S.game === 'batard' && S.round > S.batardMaxTours) {
            finalizeManche(S.players.reduce((a,b) => S.scores[a.name].points > S.scores[b.name].points ? a : b).name); return;
        }

        // Mode Shanghai
        if(S.game === 'shanghai' && S.round > S.shanghaiMaxTours) {
            finalizeManche(S.players.reduce((a,b) => S.scores[a.name].points > S.scores[b.name].points ? a : b).name); return;
        }

        render();
        // Annoncer le joueur suivant par synthèse
        if(!S.winner && S.throws.length === 0) {
            speak(_t('yourTurn') + " " + S.players[S.cp].name, 1.1, 0.95);
        }
    }

    function finalizeManche(pName) {
        S.wins[pName] = (S.wins[pName] || 0) + 1;
        S.winnersHistory.push({ manche: S.currentManche, winner: pName });
        
        if (S.wins[pName] >= S.matchType) {
            S.winner = pName; soundMancheWin(); render();
            speak(_t('winnerTitle') + " " + pName + " " + _t('wonMatch'), 1.0, 0.9);
        } else {
            alert(`Manche ${S.currentManche} gagnée par ${pName} !`);
            S.currentManche++; initScores(); render();
        }
    }

    // ── Écran d'Affichage du VAINQUEUR DU MATCH ────────────────────────────
    function renderWinnerBox() {
        let confettis = Array.from({length:30}).map(() => {
            let left = Math.random()*100; let delay = Math.random()*3; let size = Math.random()*1.5 + 1;
            return `<div class="confetti" style="left:${left}%; animation-delay:${delay}s; font-size:${size}rem">🎉</div>`;
        }).join('');

        return `
            <div class="winner-overlay">
                ${confettis}
                <div class="winner-box">
                    <h2 style="color:var(--c-accent); font-size:1.5rem; letter-spacing:2px">${_t('winnerTitle')}</h2>
                    <h1>🏆 ${S.winner} 🏆</h1>
                    <p style="margin:15px 0; font-size:1.2rem; text-align:center">${_t('wonMatch')}</p>
                    <button class="btn btn-primary" style="margin-top:10px" onclick="location.reload()">${_t('resetBtn')}</button>
                </div>
            </div>
        `;
    }

    // Initialisation
    render();
</script>
</body>
